services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: telegrambot:local
    container_name: telegramBot
    restart: unless-stopped
    env_file:
      - ../.env

    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      - "traefik.http.services.telegrambot.loadbalancer.server.port=8080"

      - "traefik.http.middlewares.telegrambot-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.telegrambot-headers.headers.customrequestheaders.X-Forwarded-Port=443"

      - "traefik.http.routers.telegrambot-webhook.rule=Host(`${BOT_DOMAIN}`) && PathPrefix(`/webhook`)"
      - "traefik.http.routers.telegrambot-webhook.entrypoints=websecure"
      - "traefik.http.routers.telegrambot-webhook.tls=true"
      - "traefik.http.routers.telegrambot-webhook.tls.certresolver=le"
      - "traefik.http.routers.telegrambot-webhook.priority=100"
      - "traefik.http.routers.telegrambot-webhook.service=telegrambot"
      - "traefik.http.routers.telegrambot-webhook.middlewares=telegrambot-headers"

      - "traefik.http.routers.telegrambot-health.rule=Host(`${BOT_DOMAIN}`) && Path(`/healthz`)"
      - "traefik.http.routers.telegrambot-health.entrypoints=websecure"
      - "traefik.http.routers.telegrambot-health.tls=true"
      - "traefik.http.routers.telegrambot-health.tls.certresolver=le"
      - "traefik.http.routers.telegrambot-health.priority=90"
      - "traefik.http.routers.telegrambot-health.service=telegrambot"

networks:
  proxy:
    external: true
    name: proxy